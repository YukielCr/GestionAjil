<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Alumnos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="profile-icon">
                <i class="fas fa-user"></i>
            </div>
            <ul class="nav-links">
               <li onclick="showTab('home')"><i class="fas fa-home"></i><span>Pagina Principal</span></li>
                <li class="active" onclick="showTab('alumnos')"><i class="fas fa-graduation-cap"></i><span>Alumnos</span></li>
                <li onclick="showTab('asistencias')"><i class="fas fa-calendar-check"></i><span>Asistencias</span></li>
                <li onclick="showTab('clases')"><i class="fas fa-book"></i><span>Clases</span></li>
                <li onclick="showTab('finanzas')"><i class="fas fa-piggy-bank"></i><span>Finanzas</span></li>
                <li onclick="showTab('reportes')"><i class="fas fa-chart-bar"></i><span>Reportes</span></li>
            </ul>
        </nav>

        <main class="main-content alumnos-layout">
            
            <header class="top-bar-simple">
                <div class="spacer"></div> <div class="notification">
                    <i class="fas fa-bell"></i>
                </div>
            </header>

            <div class="filters-section">
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Buscar">
                </div>
                
                <div class="dropdowns-container">
                    <div class="custom-select">
                        <select>
                            <option value="">Nombre</option>
                        </select>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="custom-select">
                        <select>
                            <option value="">Disciplina</option>
                        </select>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="custom-select">
                        <select>
                            <option value="">Estatus</option>
                        </select>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Foto</th>
                            <th>Nombre</th>
                            <th>Disciplina</th>
                            <th>Fecha de Pago</th>
                            <th>Estatus</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><div class="avatar-small"><img src="https://i.pravatar.cc/150?img=5" alt="foto"></div></td>
                            <td>Name</td>
                            <td>Disciplina</td>
                            <td>15/08/2026</td>
                            <td><span class="status-dot success"></span></td>
                        </tr>
                        <tr>
                            <td><div class="avatar-small"><img src="https://i.pravatar.cc/150?img=8" alt="foto"></div></td>
                            <td>Name</td>
                            <td>Disciplina</td>
                            <td>15/08/2026</td>
                            <td><span class="status-dot danger"></span></td>
                        </tr>
                        <tr>
                            <td><div class="avatar-small"><img src="https://i.pravatar.cc/150?img=9" alt="foto"></div></td>
                            <td>Name</td>
                            <td>Disciplina</td>
                            <td>15/08/2026</td>
                            <td><span class="status-dot success"></span></td>
                        </tr>
                        <tr>
                            <td><div class="avatar-small"><img src="https://i.pravatar.cc/150?img=12" alt="foto"></div></td>
                            <td>Name</td>
                            <td>Disciplina</td>
                            <td>15/08/2026</td>
                            <td><span class="status-dot danger"></span></td>
                        </tr>
                        <tr>
                            <td><div class="avatar-small"><img src="https://i.pravatar.cc/150?img=10" alt="foto"></div></td>
                            <td>Name</td>
                            <td>Disciplina</td>
                            <td>15/08/2026</td>
                            <td><span class="status-dot danger"></span></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="bottom-action">
                <button class="btn-lila"><i class="fas fa-plus"></i> Nuevo alumno</button>
            </div>

        </main>
    </div>
</body>
</html>
